name: Bug report
description: Report a reproducible defect in CT Toolkit.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide a minimal, reproducible report.

  - type: input
    id: version
    attributes:
      label: CT Toolkit version
      description: Which version are you using?
      placeholder: 0.3.19
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: 3.11.11
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, provider, model, deployment target, and any relevant package versions.
      placeholder: macOS 15, OpenAI-compatible endpoint, LM Studio, uv, etc.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide the smallest set of steps needed to trigger the issue.
      placeholder: |
        1. Configure WrapperConfig with ...
        2. Call ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or traceback
      render: shell
      description: Paste any traceback, HTTP error payload, or divergence/judge output here.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: I removed secrets, API keys, and sensitive data from logs.
          required: true
