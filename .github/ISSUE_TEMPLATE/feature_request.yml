name: Feature request
description: Propose an enhancement to CT Toolkit.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Use this template for roadmap-aligned improvements, DX requests, and new integrations.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, workflow, or behavior you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What are you doing today, and why is it insufficient?
    validations:
      required: false

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core wrapper
        - Divergence engine
        - ICM / L3
        - Provenance / security
        - CLI
        - Middleware / integrations
        - Documentation
        - Examples
        - Other
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Why this matters
      description: Explain the value for identity continuity, security, or developer experience.
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues for duplicates.
          required: true
        - label: This request is specific enough to be actionable.
          required: true
