site_name: Computational Theseus Toolkit
site_description: Identity Continuity & Hierarchical LLM Guardrails
site_author: Computational Theseus Team
site_url: https://hakandamar.github.io/ct-toolkit

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Core Concepts:
      - Identity Continuity: concepts/identity-continuity.md
      - Constitutional Kernels: concepts/kernels.md
      - Divergence Engine: concepts/divergence.md
      - Tiered Guardrails: concepts/tiered-guardrails.md
  - Middlewares:
      - LangChain: middleware/langchain.md
      - Deep Agents: middleware/deepagents.md
      - CrewAI: middleware/crewai.md
      - AutoGen: middleware/autogen.md
  - Technical Reference:
      - Kernels & Templates: reference/kernels-templates.md
      - Compatibility Matrix: reference/compatibility.md
  - Examples:
      - Overview: examples/index.md
      - Financial Auditor (SSC): examples/ssc-financial-auditor.md
      - Hierarchical Safety: examples/hierarchical-safety.md
  - API Reference: api/reference.md
